<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Link Undangan</title>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Jost', sans-serif;
            min-height: 100vh;
            background: #17120D;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #1F1710;
            border: 1px solid rgba(201, 169, 110, .25);
            padding: 48px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        .card::before {
            content: '✦  ✦  ✦';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            color: #C9A96E;
            letter-spacing: 14px;
            background: #1F1710;
            padding: 0 12px;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 42px;
            color: #E8D5A3;
            margin-bottom: 6px;
        }

        .sub {
            font-size: 10px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #C9A96E;
            margin-bottom: 32px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .4);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(201, 169, 110, .25);
            color: #FAF6EF;
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color .3s;
            margin-bottom: 16px;
        }

        input:focus {
            border-color: #C9A96E;
        }

        input::placeholder {
            color: rgba(255, 255, 255, .2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #C9A96E;
            border: none;
            color: #17120D;
            font-family: 'Jost', sans-serif;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .3s;
            margin-bottom: 24px;
        }

        button:hover {
            background: #E8D5A3;
        }

        .result {
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-label {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .35);
            margin-bottom: 8px;
        }

        .link-box {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(201, 169, 110, .2);
            padding: 12px 14px;
            font-size: 13px;
            color: #C9A96E;
            word-break: break-all;
            text-align: left;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .copy-row {
            display: flex;
            gap: 10px;
        }

        .btn-copy,
        .btn-wa {
            flex: 1;
            padding: 11px;
            font-family: 'Jost', sans-serif;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all .3s;
            border: none;
        }

        .btn-copy {
            background: transparent;
            border: 1px solid #C9A96E;
            color: #C9A96E;
        }

        .btn-copy:hover {
            background: #C9A96E;
            color: #17120D;
        }

        .btn-wa {
            background: #25D366;
            color: #fff;
        }

        .btn-wa:hover {
            background: #1ebe5d;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #C9A96E;
            color: #17120D;
            padding: 10px 24px;
            font-size: 11px;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Ronald &amp; Diana</h1>
        <p class="sub">Generator Link Undangan</p>

        <label>Nama Tamu Undangan</label>
        <input type="text" id="nama" placeholder="Contoh: Budi Santoso" oninput="generateLink()">

        <button onclick="generateLink()">✦ &nbsp; Buat Link</button>

        <div class="result" id="result">
            <p class="result-label">Link Undangan</p>
            <div class="link-box" id="link-box">—</div>
            <div class="copy-row">
                <button class="btn-copy" onclick="copyLink()">Salin Link</button>
                <button class="btn-wa" onclick="shareWA()">Kirim via WhatsApp</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Link berhasil disalin ✦</div>

    <script>
        // Ganti dengan URL hosting Anda
        // Jika masih lokal gunakan: window.location.origin + '/index.html'
        const BASE_URL = 'https://websitesaya.github.io/UndanganRonald-Diana/index.html';

        function generateLink() {
            const nama = document.getElementById('nama').value.trim();
            if (!nama) {
                document.getElementById('result').classList.remove('show');
                return;
            }
            const link = BASE_URL + '?to=' + encodeURIComponent(nama);
            document.getElementById('link-box').textContent = link;
            document.getElementById('result').classList.add('show');
        }

        function copyLink() {
            const link = document.getElementById('link-box').textContent;
            navigator.clipboard.writeText(link).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            });
        }

        function shareWA() {
            const nama = document.getElementById('nama').value.trim();
            const link = document.getElementById('link-box').textContent;
            const pesan =
                `Assalamu'alaikum Warahmatullahi Wabarakatuh 🌿\n\n` +
                `Kepada Yth.\n*${nama}*\n\n` +
                `Tanpa mengurangi rasa hormat, kami mengundang Bapak/Ibu/Saudara/i untuk hadir dalam acara pernikahan kami.\n\n` +
                `Berikut link undangan digital kami:\n${link}\n\n` +
                `Merupakan suatu kehormatan apabila Bapak/Ibu/Saudara/i berkenan hadir. 🤍`;
            window.open('https://wa.me/?text=' + encodeURIComponent(pesan), '_blank');
        }
    </script>
</body>

</html>
